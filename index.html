<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Split Pro - Mobile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://saitrip-ecb34-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToCloud = function(data) {
            set(ref(db, 'tripMasterData'), data);
        };

        onValue(ref(db, 'tripMasterData'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                allTrips = data;
                updateTripDropdown();
                refresh();
            }
        });
    </script>

    <style>
        :root {
            --bg-color: #050a14;
            --card-bg: #111827;
            --text-color: #e2e8f0;
            --input-bg: #1f2937;
            --border-color: #374151;
            --neon-blue: #00d2ff;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card-style { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1.5rem; }
        
        /* मोबाइल के लिए बड़े इनपुट्स */
        input, select { 
            background-color: var(--input-bg) !important; 
            border: 1px solid var(--border-color) !important; 
            color: var(--text-color) !important; 
            height: 3.5rem; /* Large touch area */
            font-size: 1rem !important;
            padding: 0 1rem !important;
            border-radius: 0.75rem !important;
        }

        .neon-btn { 
            background-color: var(--neon-blue); 
            color: white; 
            font-weight: 800;
            height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        #tripModal { display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        
        /* Custom Chip Style */
        .user-chip {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 210, 255, 0.15);
            border: 1px solid var(--neon-blue);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            margin: 0.25rem;
        }

        /* टेबल को मोबाइल पर कार्ड जैसा दिखाने के लिए */
        .mobile-table-row {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
    </style>
</head>

<body class="pb-20"> <div id="tripModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="modal-content card-style w-full max-w-sm p-6 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">✕</button>
            <h2 class="text-2xl font-black text-sky-400 mb-6 uppercase tracking-tight">New Trip</h2>
            
            <div class="space-y-4">
                <input id="modalTripName" type="text" placeholder="Trip Name (Goa, Ladakh...)" class="w-full">
                
                <div class="flex gap-2">
                    <input id="modalUserName" type="text" placeholder="Buddy Name" class="flex-1">
                    <button onclick="addMemberToModal()" class="bg-sky-500 w-14 rounded-xl font-bold text-2xl">+</button>
                </div>
                
                <div id="modalUserList" class="flex flex-wrap max-h-32 overflow-y-auto"></div>
                
                <button onclick="finalizeNewTrip()" class="w-full neon-btn rounded-xl mt-4">Create Trip Now</button>
            </div>
        </div>
    </div>

    <div class="p-4 space-y-6">
        
        <div class="flex flex-col gap-4">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black text-sky-400 italic">TRIP SPLIT PRO</h1>
                    <p id="displayTripName" class="text-xs opacity-50 font-mono uppercase tracking-widest"></p>
                </div>
                <button onclick="document.body.classList.toggle('light-theme')" class="p-3 bg-gray-800 rounded-2xl">🌓</button>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <select id="tripSelector" onchange="switchTrip()" class="w-full font-bold"></select>
                <button onclick="openModal()" class="bg-green-600 rounded-xl font-bold text-xs uppercase">New Trip</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <div class="card-style p-5 bg-gradient-to-br from-sky-900/20 to-transparent border-sky-500/30">
                <p class="text-[10px] font-bold opacity-50 uppercase mb-1">Total Expenses</p>
                <div class="text-4xl font-black text-white" id="totalExpense">₹0</div>
                <div id="settlement" class="mt-4 space-y-2 text-xs border-t border-gray-700 pt-4"></div>
            </div>

            <div class="card-style p-5">
                <h3 class="text-[10px] font-bold opacity-50 uppercase mb-4 tracking-widest">Buddies Status</h3>
                <div id="userList" class="grid grid-cols-1 gap-3"></div>
                <div class="mt-4 flex gap-2">
                    <input id="userName" placeholder="New Buddy" class="flex-1 h-10 text-sm">
                    <button onclick="addOrUpdateUser()" class="bg-sky-500 px-4 rounded-xl font-bold">+</button>
                </div>
            </div>
        </div>

        <div class="card-style p-5 shadow-xl">
            <h3 class="text-sm font-bold text-sky-400 uppercase mb-4 tracking-tighter">Add Expense</h3>
            <div class="space-y-3">
                <input id="desc" placeholder="What for? (Food, Fuel...)" class="w-full">
                <div class="grid grid-cols-2 gap-2">
                    <input id="amount" type="number" placeholder="Amount ₹" class="w-full">
                    <select id="payer" class="w-full"></select>
                </div>
                <input id="date" type="date" class="w-full">
                
                <div class="p-3 bg-gray-900/50 rounded-xl border border-gray-800">
                    <p class="text-[10px] font-bold opacity-50 uppercase mb-3 text-center">Split With</p>
                    <div id="splitBox" class="flex flex-wrap justify-center gap-2"></div>
                </div>

                <div class="flex gap-2">
                    <input type="hidden" id="editExpIndex" value="-1">
                    <button onclick="addExpense()" id="saveBtn" class="flex-1 neon-btn rounded-2xl">Save Transaction</button>
                    <button id="cancelEdit" onclick="resetForm()" class="hidden bg-gray-700 px-4 rounded-2xl text-xs font-bold uppercase">X</button>
                </div>
            </div>
        </div>

        <div class="card-style overflow-hidden">
            <div class="p-4 bg-gray-800/50 flex justify-between items-center">
                <h3 class="font-bold text-xs uppercase">Recent Logs</h3>
                <div class="flex gap-2">
                    <button onclick="downloadPDF()" class="text-[10px] border border-sky-500 px-3 py-1 rounded-full text-sky-400 font-bold uppercase">PDF</button>
                    <button onclick="deleteCurrentTrip()" class="text-[10px] border border-red-500 px-3 py-1 rounded-full text-red-500 font-bold uppercase">Delete Trip</button>
                </div>
            </div>
            <div id="mobileLogs" class="divide-y divide-gray-800">
                </div>
        </div>
    </div>

    <script>
        let allTrips = JSON.parse(localStorage.getItem('tripMasterData')) || { "My Trip": { users: ["Admin"], expenses: [] } };
        let currentTripKey = localStorage.getItem('currentTripKey') || "My Trip";
        let tempModalUsers = [];

        window.onload = () => {
            document.getElementById("date").value = new Date().toISOString().split("T")[0];
            updateTripDropdown();
            refresh();
        };

        function openModal() {
            tempModalUsers = [];
            document.getElementById("modalTripName").value = "";
            document.getElementById("modalUserList").innerHTML = "";
            document.getElementById("tripModal").style.display = "flex";
        }

        function closeModal() { document.getElementById("tripModal").style.display = "none"; }

        function addMemberToModal() {
            let name = document.getElementById("modalUserName").value.trim();
            if (name && !tempModalUsers.includes(name)) {
                tempModalUsers.push(name);
                renderModalUsers();
                document.getElementById("modalUserName").value = "";
            }
        }

        function removeMemberFromModal(idx) {
            tempModalUsers.splice(idx, 1);
            renderModalUsers();
        }

        function renderModalUsers() {
            document.getElementById("modalUserList").innerHTML = tempModalUsers.map((u, i) => `
                <div class="user-chip">
                    <span>${u}</span>
                    <button onclick="removeMemberFromModal(${i})" class="ml-2 text-red-400">✕</button>
                </div>
            `).join("");
        }

        function finalizeNewTrip() {
            let tripName = document.getElementById("modalTripName").value.trim();
            if (!tripName || tempModalUsers.length === 0) return alert("Fill all details!");
            allTrips[tripName] = { users: tempModalUsers, expenses: [] };
            currentTripKey = tripName;
            closeModal();
            saveAndRefresh();
        }

        function updateTripDropdown() {
            const selector = document.getElementById("tripSelector");
            if(!allTrips[currentTripKey]) currentTripKey = Object.keys(allTrips)[0];
            selector.innerHTML = Object.keys(allTrips).map(name => `<option value="${name}" ${name===currentTripKey?'selected':''}>${name}</option>`).join("");
            document.getElementById("displayTripName").innerText = currentTripKey;
        }

        function saveAndRefresh() {
            localStorage.setItem('tripMasterData', JSON.stringify(allTrips));
            localStorage.setItem('currentTripKey', currentTripKey);
            if (window.saveToCloud) window.saveToCloud(allTrips);
            updateTripDropdown();
            refresh();
        }

        function switchTrip() {
            currentTripKey = document.getElementById("tripSelector").value;
            saveAndRefresh();
        }

        function addOrUpdateUser() {
            let name = document.getElementById("userName").value.trim();
            if (!name || allTrips[currentTripKey].users.includes(name)) return;
            allTrips[currentTripKey].users.push(name);
            document.getElementById("userName").value = "";
            saveAndRefresh();
        }

        function deleteUser(i) {
            if (confirm("Remove user?")) {
                let name = allTrips[currentTripKey].users[i];
                allTrips[currentTripKey].users.splice(i, 1);
                allTrips[currentTripKey].expenses = (allTrips[currentTripKey].expenses || []).filter(e => e.payer !== name);
                saveAndRefresh();
            }
        }

        function addExpense() {
            const trip = allTrips[currentTripKey];
            let amt = parseFloat(document.getElementById("amount").value);
            let selected = [...document.querySelectorAll("#splitBox input:checked")].map(cb => cb.value);
            if (isNaN(amt) || selected.length === 0) return alert("Enter Amount & Select Buddies!");

            let expObj = {
                desc: document.getElementById("desc").value || "Expense",
                amount: amt, payer: document.getElementById("payer").value,
                split: selected, perHead: amt/selected.length, date: document.getElementById("date").value
            };

            let editIdx = parseInt(document.getElementById("editExpIndex").value);
            if (!trip.expenses) trip.expenses = [];
            if (editIdx === -1) trip.expenses.push(expObj);
            else trip.expenses[editIdx] = expObj;

            resetForm();
            saveAndRefresh();
        }

        function resetForm() {
            document.getElementById("desc").value = "";
            document.getElementById("amount").value = "";
            document.getElementById("editExpIndex").value = "-1";
            document.getElementById("saveBtn").innerText = "Save Transaction";
            document.getElementById("cancelEdit").classList.add("hidden");
        }

        function deleteCurrentTrip() {
            if (Object.keys(allTrips).length <= 1) return alert("Cannot delete last trip!");
            if (confirm("Delete this trip forever?")) {
                delete allTrips[currentTripKey];
                currentTripKey = Object.keys(allTrips)[0];
                saveAndRefresh();
            }
        }

        function refresh() {
            const trip = allTrips[currentTripKey];
            if(!trip) return;

            document.getElementById("payer").innerHTML = trip.users.map(u => `<option value="${u}">${u}</option>`).join("");
            document.getElementById("splitBox").innerHTML = trip.users.map(u => `
                <label class="flex items-center gap-2 bg-gray-800 px-4 py-2 rounded-xl text-xs border border-gray-700">
                    <input type="checkbox" value="${u}" checked> ${u}
                </label>
            `).join("");

            // Mobile Log Rows (Replacing Table)
            const expenses = trip.expenses || [];
            document.getElementById("mobileLogs").innerHTML = expenses.map((e, i) => `
                <div class="mobile-table-row">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-lg text-white">${e.desc}</p>
                            <p class="text-xs text-sky-400 font-bold uppercase">${e.payer} paid</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-xl">₹${e.amount}</p>
                            <p class="text-[10px] opacity-40">${e.date}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-[10px] opacity-60 italic">Split: ${e.split.join(", ")}</p>
                        <div class="flex gap-4">
                            <button onclick="editExp(${i})" class="text-blue-400 text-lg">✏️</button>
                            <button onclick="deleteExp(${i})" class="text-red-500 text-lg">🗑️</button>
                        </div>
                    </div>
                </div>
            `).reverse().join("");

            calculate(trip);
        }

        function editExp(i) {
            const exp = allTrips[currentTripKey].expenses[i];
            document.getElementById("desc").value = exp.desc;
            document.getElementById("amount").value = exp.amount;
            document.getElementById("date").value = exp.date;
            document.getElementById("payer").value = exp.payer;
            document.getElementById("editExpIndex").value = i;
            document.getElementById("saveBtn").innerText = "Update";
            document.getElementById("cancelEdit").classList.remove("hidden");
            window.scrollTo({ top: 400, behavior: 'smooth' });
        }

        function deleteExp(i) {
            if(confirm("Delete this log?")) {
                allTrips[currentTripKey].expenses.splice(i, 1);
                saveAndRefresh();
            }
        }

        function calculate(trip) {
            let bal = {};
            trip.users.forEach(u => bal[u] = 0);
            let total = 0;
            (trip.expenses || []).forEach(e => {
                total += e.amount;
                bal[e.payer] += e.amount;
                e.split.forEach(u => { if(bal[u] !== undefined) bal[u] -= e.perHead; });
            });
            document.getElementById("totalExpense").innerText = "₹" + total.toLocaleString();

            document.getElementById("userList").innerHTML = trip.users.map((u, i) => {
                let b = bal[u] || 0;
                let isPlus = b >= 0;
                return `
                    <div class="flex justify-between items-center bg-gray-900/40 p-3 rounded-xl border border-gray-800">
                        <div>
                            <p class="text-xs font-bold uppercase">${u}</p>
                            <p class="text-[10px] ${isPlus?'text-green-500':'text-red-500'} font-bold">${isPlus?'Settle: Get back':'Settle: Give'}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <p class="text-lg font-black ${isPlus?'text-green-400':'text-red-400'}">${isPlus?'+':''}₹${Math.abs(b).toFixed(2)}</p>
                            <button onclick="deleteUser(${i})" class="text-red-900">✕</button>
                        </div>
                    </div>`;
            }).join("");

            // Settlements Calculation
            let d=[], c=[];
            for(let u in bal){
                if(bal[u] < -0.01) d.push({n:u, a:-bal[u]});
                else if(bal[u] > 0.01) c.push({n:u, a:bal[u]});
            }
            let res = [];
            let dIdx=0, cIdx=0;
            while(dIdx < d.length && cIdx < c.length){
                let amt = Math.min(d[dIdx].a, c[cIdx].a);
                res.push(`<div class="flex justify-between text-sky-300"><span>${d[dIdx].n} ➜ ${c[cIdx].n}</span><span class="font-bold">₹${amt.toFixed(2)}</span></div>`);
                d[dIdx].a -= amt; c[cIdx].a -= amt;
                if(d[dIdx].a < 0.01) dIdx++; if(c[cIdx].a < 0.01) cIdx++;
            }
            document.getElementById("settlement").innerHTML = res.length ? res.join("") : "<p class='opacity-50 text-center py-2'>All Settled! ✅</p>";
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF('l', 'mm', 'a4');
            doc.text(`TRIP REPORT: ${currentTripKey.toUpperCase()}`, 14, 15);
            let rows = (allTrips[currentTripKey].expenses || []).map(e => [e.date, e.desc, e.payer, e.split.join(", "), "Rs. "+e.amount, "Rs. "+e.perHead.toFixed(2)]);
            doc.autoTable({ head:[["Date","Item","Payer","Split","Total","Per Head"]], body:rows, startY: 25, theme: 'grid' });
            doc.save(`${currentTripKey}_Log.pdf`);
        }
    </script>
</body>
</html>
